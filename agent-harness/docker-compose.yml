services:
  bill-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Mount knowledge docs so they persist and can be updated without rebuild
      - type: bind
        source: ../knowledge-docs
        target: /app/knowledge-docs
        read_only: true
    environment:
      - HOST=0.0.0.0
      - PORT=8000
    restart: unless-stopped
